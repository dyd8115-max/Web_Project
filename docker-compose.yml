version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - pawlog-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - pawlog-net
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=jdbc:mysql://db:3306/pawlogdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - DATABASE_USERNAME=pawlog
      - DATABASE_PASSWORD=pawlog123
      - DATABASE_DRIVER=com.mysql.cj.jdbc.Driver
      - HIBERNATE_DIALECT=org.hibernate.dialect.MySQLDialect
      - JWT_SECRET=pawlog-super-secret-key-for-jwt-token-minimum-256-bits-long
      - SERVER_PORT=8080
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pawlog-net

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: pawlogdb
      MYSQL_USER: pawlog
      MYSQL_PASSWORD: pawlog123
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "pawlog", "-ppawlog123"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pawlog-net

networks:
  pawlog-net:
    driver: bridge

volumes:
  db-data:
