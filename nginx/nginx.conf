events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:80;
    }
    upstream backend {
        server backend:8080;
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 20M;

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /swagger-ui/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location /api-docs {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
